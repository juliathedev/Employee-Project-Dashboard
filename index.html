<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="assets/dashboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="burger">
            <div class="burger__line"></div>
            <div class="burger__line"></div>
            <div class="burger__line"></div>
        </div>
        <nav class="menu">
            <div class="logo__wrapper">
                <img src="assets/logo.svg" alt="" class="logo">
                <p class="logo__text">Project D</p>
            </div>
            <ul class="menu__list">
                <li class="menu__item"><a href="#" class="menu__link">Home</a>
                    <i class="fa-solid fa-chart-column"></i>
                </li>
                <li class="menu__item"><a href="#" class="menu__link">Projects</a>
                    <i class="fa-solid fa-diagram-project"></i>
                </li>
                <li class="menu__item"><a href="#" class="menu__link">Employees</a>
                    <i class="fa-solid fa-address-book"></i>
                </li>
            </ul>
        </nav>
        <div class="selectors">
            <div class="month-selector">
                <h3>Period</h3>
                <select name="months" id="months">
                    <option value="january">January</option>
                    <option value="february">February</option>
                    <option value="march">March</option>
                    <option value="april">April</option>
                    <option value="may">May</option>
                    <option value="june">June</option>
                    <option value="july">July</option>
                    <option value="august">August</option>
                    <option value="september">September</option>
                    <option value="october">October</option>
                    <option value="november">November</option>
                    <option value="december">December</option>
                </select>
            </div>
            <div class="year-selector">
                <h3>Year</h3>
                <select name="years" id="years">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
        </div>
    </aside>
    <main class="main">
        <section class="projects">
            <div class="projects__content">
                <h1 class="projects__header">Projects</h1>
                <div class="projects__buttons">
                    <button class="btn project-btn">
                        <i class="fa-solid fa-plus"></i>
                        <p class="btn-text">Add Project</p>
                    </button>
                    <button class="btn data-btn">
                        <i class="fa-solid fa-database"></i>
                        <p class="btn-text">Seed data</p>
                    </button>
                </div>
                <div class="project__filter"></div>
                <table class="projects__table">
                    <thead>
                        <tr>
                            <th class="sortable filterable" data-sort="companyName" data-filter="companyName">
                                Company Name
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </th>
                            <th class="sortable filterable" data-sort="projectName" data-filter="projectName">
                                Project Name
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </th>
                            <th class="sortable" data-sort="budget">Budget
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                            </th>
                            <th class="sortable" data-sort="employeeCapacity">Employee Capacity
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                            </th>
                            <th class="sortable" data-sort="employees">Employees
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                            </th>
                            <th class="sortable" data-sort="estimatedIncome">Estimated Income
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Project rows will be populated by JavaScript -->
                    </tbody>
                </table>
                <div class="projects__total-income" id="totalIncome">
                    <p class="total-income-header">total estimated income</p>
                    <p class="total-income-value">$0.00</p>
                </div>
            </div>
        </section>
        <section class="employees">
                <div class="employees__content">
                    <div class="employees__content__header">
                        <h1 class="employees__header">Employees</h1>
                        <div class="Employees__buttons">
                            <button class="btn employee-btn">
                                <i class="fa-solid fa-plus"></i>
                                <p class="btn-text">Add Employee</p>
                            </button>
                        </div>
                    </div>
                    <div id="employees__filters-container" class="filters-container"></div>
                    <table class="employees__table">
                        <thead>
                            <tr>
                                <th class="sortable filterable" data-sort="firstName" data-filter="firstName">
                                    First Name
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable filterable" data-sort="lastName" data-filter="lastName">
                                    Last Name
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable" data-sort="age">
                                    Age
                                </th>
                                <th class="sortable filterable" data-sort="position" data-filter="position">Position
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable" data-sort="salary">Salary
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th class="sortable filterable" data-sort="projectId" data-filter="projectId">Project
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable" data-sort="projectIncome">Project Income
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Employee rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
        </section>
    </main>
</body>
</html>
