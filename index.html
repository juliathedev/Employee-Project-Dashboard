<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="assets/dashboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="burger">
            <div class="burger__line"></div>
            <div class="burger__line"></div>
            <div class="burger__line"></div>
        </div>
        <nav class="menu">
            <div class="logo__wrapper">
                <img src="assets/logo.svg" alt="" class="logo">
                <p class="logo__text">Project D</p>
            </div>
            <ul class="menu__list">
                <li class="menu__item"><a href="#" class="menu__link">Home</a>
                    <i class="fa-solid fa-chart-column"></i>
                </li>
                <li class="menu__item"><a href="#" class="menu__link">Projects</a>
                    <i class="fa-solid fa-diagram-project"></i>
                </li>
                <li class="menu__item"><a href="#" class="menu__link">Employees</a>
                    <i class="fa-solid fa-address-book"></i>
                </li>
            </ul>
        </nav>
        <div class="selectors">
            <div class="month-selector">
                <h3>Period</h3>
                <select name="months" id="months">
                    <option value="january">January</option>
                    <option value="february">February</option>
                    <option value="march">March</option>
                    <option value="april">April</option>
                    <option value="may">May</option>
                    <option value="june">June</option>
                    <option value="july">July</option>
                    <option value="august">August</option>
                    <option value="september">September</option>
                    <option value="october">October</option>
                    <option value="november">November</option>
                    <option value="december">December</option>
                </select>
            </div>
            <div class="year-selector">
                <h3>Year</h3>
                <select name="years" id="years">
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>
        </div>
    </aside>
</body>
</html>
