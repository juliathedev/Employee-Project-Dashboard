<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/dashboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar__container">
                <div class="sidebar__header-container">
                    <div class="sidebar__header">
                        <div class="brand">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path opacity="0.6" d="M14 16C14 17.77 13.23 19.37 12 20.46C10.94 21.42 9.54 22 8 22C4.69 22 2 19.31 2 16C2 13.24 3.88 10.9 6.42 10.21C7.11 11.95 8.59 13.29 10.42 13.79C10.92 13.93 11.45 14 12 14C12.55 14 13.08 13.93 13.58 13.79C13.85 14.47 14 15.22 14 16Z" fill="#5030E5"/>
                                <path d="M18 8C18 8.78 17.85 9.53 17.58 10.21C16.89 11.95 15.41 13.29 13.58 13.79C13.08 13.93 12.55 14 12 14C11.45 14 10.92 13.93 10.42 13.79C8.59 13.29 7.11 11.95 6.42 10.21C6.15 9.53 6 8.78 6 8C6 4.69 8.69 2 12 2C15.31 2 18 4.69 18 8Z" fill="#5030E5"/>
                                <path opacity="0.4" d="M22 16C22 19.31 19.31 22 16 22C14.46 22 13.06 21.42 12 20.46C13.23 19.37 14 17.77 14 16C14 15.22 13.85 14.47 13.58 13.79C15.41 13.29 16.89 11.95 17.58 10.21C20.12 10.9 22 13.24 22 16Z" fill="#5030E5"/>
                            </svg>
                            <span class="brand__name">Project M.</span>
                        </div>
                        <button class="menu-toggle">
                            <div class="menu-toogle__container">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M12.5 17.225C12.3417 17.225 12.1834 17.1667 12.0584 17.0417L6.62502 11.6083C5.74169 10.725 5.74169 9.27499 6.62502 8.39165L12.0584 2.95832C12.3 2.71665 12.7 2.71665 12.9417 2.95832C13.1834 3.19999 13.1834 3.59999 12.9417 3.84165L7.50836 9.27499C7.10836 9.67499 7.10836 10.325 7.50836 10.725L12.9417 16.1583C13.1834 16.4 13.1834 16.8 12.9417 17.0417C12.8167 17.1583 12.6584 17.225 12.5 17.225Z" fill="#787486"/>
                                </svg>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M12.5 17.225C12.3417 17.225 12.1834 17.1667 12.0584 17.0417L6.62502 11.6083C5.74169 10.725 5.74169 9.27499 6.62502 8.39165L12.0584 2.95832C12.3 2.71665 12.7 2.71665 12.9417 2.95832C13.1834 3.19999 13.1834 3.59999 12.9417 3.84165L7.50836 9.27499C7.10836 9.67499 7.10836 10.325 7.50836 10.725L12.9417 16.1583C13.1834 16.4 13.1834 16.8 12.9417 17.0417C12.8167 17.1583 12.6584 17.225 12.5 17.225Z" fill="#787486"/>
                                </svg>
                            </div>
                        </button>
                    </div>
                </div>
                <nav class="menu">
                    <ul class="menu__list">
                        <li class="menu__item">
                            <a href="#" class="menu__link">
                                <i class="fa-solid fa-chart-column"></i>
                                Home
                            </a>
                        </li>
                        <li class="menu__item">
                            <a href="#projects" class="menu__link">
                                <i class="fa-solid fa-diagram-project"></i>
                                Projects
                            </a>
                        </li>
                        <li class="menu__item">
                            <a href="#employees" class="menu__link">
                                <i class="fa-solid fa-address-book"></i>
                                Employees
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="selectors">
                <div class="month-selector">
                    <h3>Period</h3>
                    <select name="months" id="months" class="selector__select">
                        <option value="january">January</option>
                        <option value="february">February</option>
                        <option value="march">March</option>
                        <option value="april">April</option>
                        <option value="may">May</option>
                        <option value="june">June</option>
                        <option value="july">July</option>
                        <option value="august">August</option>
                        <option value="september">September</option>
                        <option value="october">October</option>
                        <option value="november">November</option>
                        <option value="december">December</option>
                    </select>
                </div>
                <div class="year-selector">
                    <select name="years" id="years" class="selector__select">
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
            </div>
        </aside>
        <main class="main">
            <section class="projects" id="projects">
                <div class="projects__content">
                    <div class="projects__header">
                        <h1 class="projects__header">Projects</h1>
                        <div class="projects__buttons">
                            <button class="btn project-btn">
                                <i class="fa-solid fa-plus"></i>
                                <p class="btn-text">Add Project</p>
                            </button>
                            <button class="btn data-btn">
                                <i class="fa-solid fa-database"></i>
                                <p class="btn-text">Seed data</p>
                            </button>
                        </div>
                    </div>
                    <div class="project__filter"></div>
                    <table class="projects__table">
                        <thead class="projects__table__header">
                            <tr>
                                <th class="sortable filterable" data-sort="companyName" data-filter="companyName">
                                    Company Name
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable filterable" data-sort="projectName" data-filter="projectName">
                                    Project Name
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </th>
                                <th class="sortable" data-sort="budget">Budget
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th class="sortable" data-sort="employeeCapacity">Employee Capacity
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th class="sortable" data-sort="employees">Employees
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th class="sortable" data-sort="estimatedIncome">Estimated Income
                                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                                </th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Project rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                    <div class="projects__total-income" id="totalIncome">
                        <strong>total estimated income</strong>
                        <span class="total-income-value positive-income">$0.00</span>
                    </div>
                </div>
            </section>
            <section class="employees hidden" id="employees">
                    <div class="employees__content">
                        <div class="employees__content__header">
                            <h1 class="employees__header">Employees</h1>
                            <div class="Employees__buttons">
                                <button class="btn employee-btn">
                                    <i class="fa-solid fa-plus"></i>
                                    <p class="btn-text">Add Employee</p>
                                </button>
                            </div>
                        </div>
                        <div id="employees__filters-container" class="filters-container"></div>
                        <table class="employees__table">
                            <thead>
                                <tr>
                                    <th class="sortable filterable" data-sort="firstName" data-filter="firstName">
                                        First Name
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </th>
                                    <th class="sortable filterable" data-sort="lastName" data-filter="lastName">
                                        Last Name
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </th>
                                    <th class="sortable" data-sort="age">
                                        Age
                                    </th>
                                    <th class="sortable filterable" data-sort="position" data-filter="position">Position
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </th>
                                    <th class="sortable" data-sort="salary">Salary
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    </th>
                                    <th class="sortable filterable" data-sort="projectId" data-filter="projectId">Project
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </th>
                                    <th class="sortable" data-sort="projectIncome">Project Income
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                    </th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Employee rows will be populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
            </section>
        </main>
    </div>
    <!-- Add projects slide panel -->
    <div class="add-project-panel" id="addProjectPanel">
        <div class="panel-overlay"></div>
        <div class="panel-container">
            <div class="panel-header">
                <h3 class="panel-header__title">Add New Project</h3>
                <button class="close-panel-btn" id="closeProjectPanelBtn">&times;</button>
            </div>
            <form id="addProjectForm">
                <div class="form-group">
                    <label>Project Name <span class="required">*</span></label>
                    <input type="text" id="projectName" placeholder="e.g., CRM Upgrade">
                    <span class="error-message" id="projectNameError"></span>
                </div>
                <div class="form-group">
                    <label>Company Name <span class="required">*</span></label>
                    <input type="text" id="companyName" placeholder="e.g., TechCorp">
                    <span class="error-message" id="companyNameError"></span>
                </div>
                <div class="form-group">
                    <label>Budget ($) <span class="required">*</span></label>
                    <input type="number" id="budget" step="0.01" placeholder="120000.00">
                    <span class="error-message" id="budgetError"></span>
                </div>
                <div class="form-group">
                    <label>Employee Capacity (FTE) <span class="required">*</span></label>
                    <input type="number" id="employeeCapacity" step="1" placeholder="2">
                    <span class="error-message" id="employeeCapacityError"></span>
                </div>
                <div class="panel-actions">
                    <button type="button" class="btn-cancel" id="cancelProjectBtn">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitProjectBtn" disabled>Create Project</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
